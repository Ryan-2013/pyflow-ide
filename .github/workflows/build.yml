name: 🚀 Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_ext: "*.AppImage *.deb"
          - os: windows-latest
            artifact_ext: "*.exe"
          - os: macos-latest
            artifact_ext: "*.dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⬇️ 修正 1：補上 simple-websocket（threading 模式的 WebSocket 支援）
      #    app.py 用的是 async_mode='threading'，不是 eventlet，
      #    所以其實不需要 eventlet；simple-websocket 才是真正要打包的。
      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install -r pyflow/requirements.txt
          python -m pip install pyinstaller==6.3.0

      - name: Bundle Python backend
        run: |
          python -m PyInstaller pyflow.spec --distpath dist-server --clean --noconfirm

      - name: List server binary
        run: ls dist-server/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci || npm install

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: |
          npx electron-builder --win --dir --publish never
          Compress-Archive -Path dist/win-unpacked/* -DestinationPath "dist/PyFlow-IDE-Windows-${{ github.ref_name }}.zip" -Force
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish never

      - name: List dist files
        run: ls dist/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          name: PyFlow IDE ${{ github.ref_name }}
          body: |
            ## ⬡ PyFlow IDE ${{ github.ref_name }}

            ### 下載

            | 平台 | 檔案 |
            |------|------|
            | Windows | `PyFlow-IDE-Windows-*.zip` |
            | macOS | `PyFlow-IDE-*.dmg` |
            | Linux | `PyFlow-IDE-*.AppImage` |

            ### 安裝說明
            - **Windows**: 解壓縮後執行 `PyFlow IDE.exe`
            - **macOS**: 拖曳到 Applications
            - **Linux**: `chmod +x *.AppImage && ./*.AppImage`

            ### 第一次執行
            啟動後點 ⚙ 按鈕安裝 LSP 伺服器（選填）
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
