name: 🚀 Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_ext: "*.AppImage *.deb"
          - os: windows-latest
            artifact_ext: "*.exe"
          - os: macos-latest
            artifact_ext: "*.dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⬇️ 修正 1：補上 simple-websocket（threading 模式的 WebSocket 支援）
      #    app.py 用的是 async_mode='threading'，不是 eventlet，
      #    所以其實不需要 eventlet；simple-websocket 才是真正要打包的。
      - name: Install Python deps + PyInstaller
        run: |
          pip install flask flask-socketio simple-websocket chardet
          pip install pyinstaller==6.3.0

      # ⬇️ 修正 2（核心）：hidden-import 改成 engineio.async_drivers.threading
      #    這是造成「打包成功但 exe 一開就閃退 / 啟動逾時」的真正原因。
      #    engineio 的 async driver 是執行時動態載入，PyInstaller 靜態分析抓不到，
      #    必須明確列出，否則會噴 ValueError: Invalid async_mode specified。
      - name: Bundle Python backend (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --onefile --noconsole --name pyflow-server `
            --icon assets/icon.ico `
            --add-data "pyflow/static;static" `
            --add-data "pyflow/plugins;plugins" `
            --add-data "pyflow/core;core" `
            --add-data "pyflow/themes;themes" `
            --add-data "pyflow/samples;samples" `
            --hidden-import flask `
            --hidden-import flask_socketio `
            --hidden-import engineio.async_drivers.threading `
            --hidden-import simple_websocket `
            --hidden-import chardet `
            --distpath dist-server `
            pyflow/app.py

      - name: Bundle Python backend (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m PyInstaller --onefile --noconsole --name pyflow-server \
            --add-data "pyflow/static:static" \
            --add-data "pyflow/plugins:plugins" \
            --add-data "pyflow/core:core" \
            --add-data "pyflow/themes:themes" \
            --add-data "pyflow/samples:samples" \
            --hidden-import flask \
            --hidden-import flask_socketio \
            --hidden-import engineio.async_drivers.threading \
            --hidden-import simple_websocket \
            --hidden-import chardet \
            --distpath dist-server \
            pyflow/app.py

      - name: List server binary
        run: ls dist-server/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci || npm install

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''

      - name: Build Electron app (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish never

      - name: List dist files
        run: ls dist/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          name: PyFlow IDE ${{ github.ref_name }}
          body: |
            ## ⬡ PyFlow IDE ${{ github.ref_name }}

            ### 下載

            | 平台 | 檔案 |
            |------|------|
            | Windows | `PyFlow-IDE-Setup-*.exe` |
            | macOS | `PyFlow-IDE-*.dmg` |
            | Linux | `PyFlow-IDE-*.AppImage` |

            ### 安裝說明
            - **Windows**: 直接執行安裝程式
            - **macOS**: 拖曳到 Applications
            - **Linux**: `chmod +x *.AppImage && ./*.AppImage`

            ### 第一次執行
            啟動後點 ⚙ 按鈕安裝 LSP 伺服器（選填）
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
