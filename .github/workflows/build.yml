name: Build Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -r pyflow/requirements.txt
          python -m pip install pyinstaller==6.3.0

      - name: Run source self-test
        run: python pyflow/qt_app.py --self-test

      - name: Build PyQt desktop application
        run: python -m PyInstaller pyflow.spec --distpath dist --workpath build/pyinstaller --clean --noconfirm

      - name: Test packaged application
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist/PyFlow IDE/PyFlow IDE.exe" -ArgumentList "--smoke" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Packaged smoke test failed with exit code $($process.ExitCode)" }

      - name: Set artifact name
        shell: pwsh
        run: |
          $safeRef = "${{ github.ref_name }}" -replace '[^A-Za-z0-9._-]', '-'
          "PYFLOW_ARCHIVE=PyFlow-IDE-Windows-$safeRef.zip" >> $env:GITHUB_ENV

      - name: Create Windows archive
        shell: pwsh
        run: Compress-Archive -Path "dist/PyFlow IDE/*" -DestinationPath "dist/$env:PYFLOW_ARCHIVE" -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PYFLOW_ARCHIVE }}
          path: dist/${{ env.PYFLOW_ARCHIVE }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PYFLOW_ARCHIVE }}
          name: PyFlow IDE ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Windows 下載

            下載 `${{ env.PYFLOW_ARCHIVE }}`，解壓縮後雙擊 `PyFlow IDE.exe`。

            這是純 PyQt 桌面版，不需要啟動 Electron 或本機 Web 伺服器。
